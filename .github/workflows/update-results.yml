name: Update Match Results

on:
  schedule:
    - cron: '0 */3 * * *'   # Runs every 3 hours automatically
  workflow_dispatch:          # Adds a manual "Run" button in GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to commit back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch results and update HTML
        run: python update_results.py

      - name: Commit and push if anything changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git diff --quiet && echo "Nothing to commit" || (
            git add index.html &&
            git commit -m "Auto-update results $(date -u '+%d %b %Y %H:%M UTC')" &&
            git push
          )
